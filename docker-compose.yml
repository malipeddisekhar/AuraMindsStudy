version: '3.9'
services:
  app:
    build: .
    container_name: augmind-app
    environment:
      DB_URL: jdbc:mysql://mysql:3306/augmind?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: augmind-mysql
    environment:
      MYSQL_DATABASE: augmind
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
